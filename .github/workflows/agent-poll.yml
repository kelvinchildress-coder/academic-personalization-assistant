# DISABLED — paused during Phase 1+ upgrade build.
# To re-enable scheduled runs, uncomment the `schedule:` block below.
# Manual runs via the Actions tab still work.
name: agent-poll

on:
  # schedule:
  #   - cron: "15 13-22 * * 1-5"
  #   - cron: "0 14 * * *"
  workflow_dispatch: {}
  schedule:
    # Phase 1 cadence: hourly during likely school hours, weekdays.
    # The runner is idempotent and self-throttling (MIN_REASK_DAYS in
    # src/agent/gap_finder.py); when there are no open gaps, it becomes
    # a once-per-tick listener.
    #
    # Times are UTC. The window 13:00-22:00 UTC covers ~07:00-16:00 CT
    # during DST and ~07:00-16:00 CT during standard time (close enough
    # for hourly polling).
    - cron: "15 13-22 * * 1-5"
    # Phase 2 daily floor: also run once at 14:00 UTC every day. This
    # ensures the agent listens for unsolicited replies on weekends and
    # holidays without flooding.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run one agent tick
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COACH_SLACK_IDS_JSON: ${{ secrets.COACH_SLACK_IDS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
        run: python scripts/agent_run.py
      - name: Commit updated agent + students state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/agent_state.json config/students.json || true
          git diff --cached --quiet || git commit -m "chore: agent tick — update student goals and state"
          git push || true
