name: grade-xp-collector

on:
  schedule:
    # Hourly during likely school hours (UTC roughly covers 06:00-22:00 CT).
    - cron: "10 12-23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Collect grade XP totals
        env:
          TIMEBACK_API_TOKEN: ${{ secrets.TIMEBACK_API_TOKEN }}
          TIMEBACK_API_BASE_URL: ${{ secrets.TIMEBACK_API_BASE_URL }}
        run: python scripts/grade_xp_collector.py
      - name: Commit updated grade_xp.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/grade_xp.json || true
          git diff --cached --quiet || git commit -m "chore: refresh grade_xp.json"
          git push || true
