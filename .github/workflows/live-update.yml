# DISABLED — paused during Phase 1+ upgrade build.
# To re-enable scheduled runs, uncomment the `schedule:` block below.
# Manual runs via the Actions tab still work.
name: live-updates

on:
  # schedule:
  #   - cron: "*/15 13-22 * * 1-5"   # every 15 min during school hours
  workflow_dispatch: {}
  schedule:
    # Roughly 09:00, 11:00, 13:00, 15:00 CT, weekdays.
    - cron: "0 14,16,18,20 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Post live update(s)
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          COACH_SLACK_IDS_JSON: ${{ secrets.COACH_SLACK_IDS_JSON }}
        run: python scripts/post_live_update.py
      - name: Commit updated thread state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json || true
          git diff --cached --quiet || git commit -m "chore: update live-update state"
          git push || true
