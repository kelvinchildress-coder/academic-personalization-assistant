name: live-updates

on:
  workflow_dispatch:
  schedule:
    # Every 30 min from 9 AM to 3 PM CT, weekdays.
    # CDT (UTC-5):  14:00–20:30 UTC
    # CST (UTC-6):  15:00–21:30 UTC
    # We run the union; the script no-ops outside school days / before
    # morning report has posted.
    - cron: "0,30 14-21 * * 1-5"

permissions:
  contents: write   # to commit data/live_state.json updates

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dateutil

      - name: Scan and post live updates
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          python -m scripts.post_live_updates

      - name: Commit live_state.json if changed
        run: |
          git config user.name "apa-bot"
          git config user.email "apa-bot@users.noreply.github.com"
          git add data/live_state.json data/morning_state.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "live-updates: persist state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
