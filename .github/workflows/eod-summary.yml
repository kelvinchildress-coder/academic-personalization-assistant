# Manual runs via the Actions tab still work.
name: eod-summary

on:
  # schedule:
  #   - cron: "0 23 * * 1-5"   # 6pm Central, weekdays
  workflow_dispatch: {}
  schedule:
    # ~17:30 CT, weekdays. Two crons to cover DST transitions.
    - cron: "30 22 * * 1-5"
    - cron: "30 23 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Post EOD summary
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python scripts/post_eod.py
