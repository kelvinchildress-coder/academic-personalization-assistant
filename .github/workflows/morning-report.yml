# DISABLED — paused during Phase 1+ upgrade build (history layer, exception
# grammar, group statements, digest v2, EoQ summaries, dashboard).
# To re-enable scheduled runs, uncomment the `schedule:` block below.
# Manual runs via the Actions tab still work.
name: morning-report

on:
  # schedule:
  #   - cron: "0 12 * * 1-5"  # 7am Central, weekdays
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Post morning report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          HEAD_COACH_SLACK_ID: ${{ secrets.HEAD_COACH_SLACK_ID }}
          COACH_SLACK_IDS_JSON: ${{ secrets.COACH_SLACK_IDS_JSON }}
        run: python scripts/post_morning.py
      - name: Commit updated thread state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json || true
          git diff --cached --quiet || git commit -m "chore: update morning thread state"
          git push || true
