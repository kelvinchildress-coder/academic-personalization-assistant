name: morning-report

on:
  schedule:
    # 07:00 CT = 12:00 UTC during DST (Mar–Nov), 13:00 UTC otherwise.
    # We run both and let the script's idempotent state guard handle it.
    - cron: "0 12 * * 1-5"
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Post morning report
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          HEAD_COACH_SLACK_ID: ${{ secrets.HEAD_COACH_SLACK_ID }}
          COACH_SLACK_IDS_JSON: ${{ secrets.COACH_SLACK_IDS_JSON }}
        run: python scripts/post_morning.py
      - name: Commit updated thread state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json || true
          git diff --cached --quiet || git commit -m "chore: update morning thread state"
          git push || true
