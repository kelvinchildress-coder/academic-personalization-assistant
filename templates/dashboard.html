<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeBack XP Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0f1629;
            --bg-card: rgba(15, 23, 42, 0.7);
            --bg-card-hover: rgba(20, 30, 55, 0.8);
            --bg-glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.15);
            --accent-emerald: #10b981;
            --accent-emerald-glow: rgba(16, 185, 129, 0.15);
            --accent-amber: #f59e0b;
            --accent-amber-glow: rgba(245, 158, 11, 0.15);
            --accent-rose: #f43f5e;
            --accent-rose-glow: rgba(244, 63, 94, 0.15);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --radius: 12px;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        .app { position: relative; z-index: 1; }

        /* ─── Top Bar ─── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: white;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .timestamp {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-emerald);
            box-shadow: 0 0 8px var(--accent-emerald);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .status-dot.offline { background: var(--text-muted); box-shadow: none; animation: none; }
        .status-dot.loading { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber); }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-icon:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* ─── Controls Bar ─── */
        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: rgba(15, 22, 41, 0.5);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .date-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"] {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="date"]:focus {
            border-color: var(--accent-blue);
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.7);
        }

        .presets {
            display: flex;
            gap: 6px;
            margin-left: 8px;
        }

        .preset-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .preset-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }
        .preset-btn.active {
            background: var(--accent-blue-glow);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        .btn-pull {
            padding: 8px 24px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .btn-pull:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.35);
        }
        .btn-pull:active { transform: translateY(0); }
        .btn-pull:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-pull svg { transition: transform 0.3s; }
        .btn-pull.loading svg { animation: spin 1s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Main Content ─── */
        .main { padding: 24px 32px; }

        /* ─── Summary Cards ─── */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: all 0.3s;
        }
        .summary-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .summary-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
        }

        .summary-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .summary-card.blue .summary-value { color: var(--accent-blue); }
        .summary-card.emerald .summary-value { color: var(--accent-emerald); }
        .summary-card.amber .summary-value { color: var(--accent-amber); }
        .summary-card.purple .summary-value { color: var(--accent-purple); }
        .summary-card.blue { box-shadow: inset 0 1px 0 var(--accent-blue-glow); }
        .summary-card.emerald { box-shadow: inset 0 1px 0 var(--accent-emerald-glow); }
        .summary-card.amber { box-shadow: inset 0 1px 0 var(--accent-amber-glow); }
        .summary-card.purple { box-shadow: inset 0 1px 0 rgba(168,85,247,0.15); }

        /* ─── Day Tabs (weekly view) ─── */
        .day-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .day-tab {
            padding: 12px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.25s;
            white-space: nowrap;
            font-family: inherit;
            min-width: 120px;
            text-align: center;
        }
        .day-tab:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }
        .day-tab.active {
            background: var(--accent-blue-glow);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .day-tab-name {
            font-weight: 600;
            font-size: 14px;
        }

        .day-tab-xp {
            font-size: 11px;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* ─── Student Grid ─── */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(380px, 100%), 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .student-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: visible;
            transition: all 0.3s;
            min-width: 0;
        }
        .student-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .student-card.flag-red { border-left: 3px solid var(--accent-rose); }
        .student-card.flag-yellow { border-left: 3px solid var(--accent-amber); }
        .student-card.flag-green { border-left: 3px solid var(--accent-emerald); }
        .student-card.flag-absent {
            border-left: 3px solid var(--accent-rose);
            background: rgba(244, 63, 94, 0.06);
            position: relative;
        }
        .absent-banner {
            background: rgba(244, 63, 94, 0.12);
            color: var(--accent-rose);
            font-size: 12px;
            font-weight: 600;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }

        .student-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }

        .student-name {
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
        }

        .student-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .badge-xp {
            background: var(--accent-blue-glow);
            color: var(--accent-blue);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        .badge-acc {
            border: 1px solid;
        }
        .badge-acc.good {
            background: var(--accent-emerald-glow);
            color: var(--accent-emerald);
            border-color: rgba(16, 185, 129, 0.2);
        }
        .badge-acc.warn {
            background: var(--accent-rose-glow);
            color: var(--accent-rose);
            border-color: rgba(244, 63, 94, 0.2);
        }
        .badge-min {
            border: 1px solid;
        }
        .badge-min.good {
            background: rgba(168, 85, 247, 0.12);
            color: var(--accent-purple);
            border-color: rgba(168, 85, 247, 0.2);
        }
        .badge-min.warn {
            background: var(--accent-amber-glow);
            color: var(--accent-amber);
            border-color: rgba(245, 158, 11, 0.2);
        }

        .student-subjects {
            padding: 12px 20px 16px;
        }

        .subject-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            gap: 12px;
            flex-wrap: wrap;
            min-width: 0;
        }
        .subject-row:last-child { border-bottom: none; }
        .subject-row.no-data { opacity: 0.3; }
        .subject-row.has-test {
            background: rgba(234, 179, 8, 0.08);
            border: 1px solid rgba(234, 179, 8, 0.25);
            border-radius: 8px;
            padding: 8px 10px;
            margin: 4px -10px;
        }
        .test-badge {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.5px; color: #eab308; background: rgba(234, 179, 8, 0.15);
            border: 1px solid rgba(234, 179, 8, 0.3); border-radius: 4px;
            padding: 2px 6px; white-space: nowrap; margin-left: 6px;
            display: inline-block;
        }

        .subject-name {
            font-size: 13px;
            font-weight: 500;
            min-width: 80px;
            max-width: 110px;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .subject-metrics {
            display: flex;
            gap: 12px;
            flex: 1;
            flex-wrap: wrap;
            align-items: center;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            white-space: nowrap;
        }

        .metric-bar {
            width: 50px;
            height: 4px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .metric-bar-fill.blue { background: var(--accent-blue); }
        .metric-bar-fill.emerald { background: var(--accent-emerald); }
        .metric-bar-fill.amber { background: var(--accent-amber); }
        .metric-bar-fill.rose { background: var(--accent-rose); }
        .metric-bar-fill.purple { background: var(--accent-purple); }

        .metric-value {
            font-weight: 600;
            min-width: 32px;
            text-align: right;
        }
        .metric-value.good { color: var(--accent-emerald); }
        .metric-value.warn { color: var(--accent-rose); }
        .metric-value.low-min { color: var(--accent-amber); }

        .metric-unit {
            color: var(--text-muted);
            font-size: 10px;
        }

        /* ─── Weekly Trends ─── */
        .trends-section {
            margin-top: 8px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .trends-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .trend-panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .trend-panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .trend-panel.alert .trend-panel-header {
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.06), rgba(245, 158, 11, 0.04));
            color: var(--accent-rose);
        }

        .trend-panel.success .trend-panel-header {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.06), rgba(59, 130, 246, 0.04));
            color: var(--accent-emerald);
        }

        .trend-panel-body {
            padding: 16px 20px;
        }

        .trend-category {
            margin-bottom: 16px;
        }
        .trend-category:last-child { margin-bottom: 0; }

        .trend-category-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .trend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--bg-glass);
            margin-bottom: 6px;
            transition: background 0.2s;
        }
        .trend-item:hover { background: rgba(255,255,255,0.04); }

        .trend-item-name {
            font-size: 13px;
            font-weight: 500;
        }

        .trend-item-value {
            font-size: 13px;
            font-weight: 700;
        }

        .trend-item-value.alert { color: var(--accent-rose); }
        .trend-item-value.warn { color: var(--accent-amber); }
        .trend-item-value.good { color: var(--accent-emerald); }
        .trend-item-value.blue { color: var(--accent-blue); }

        /* ─── Empty State ─── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* ─── Modal ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 440px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 24px 48px rgba(0,0,0,0.4);
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--bg-glass);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }

        .modal-body {
            padding: 20px 24px;
        }

        .student-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--bg-glass);
            margin-bottom: 6px;
            transition: background 0.2s;
        }
        .student-list-item:hover { background: rgba(255,255,255,0.04); }

        .student-list-name {
            font-size: 14px;
            font-weight: 500;
        }

        .btn-remove {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-remove:hover { background: var(--accent-rose-glow); color: var(--accent-rose); }

        /* ─── Group Tabs ─── */
        .group-tabs-bar {
            display: flex;
            gap: 6px;
            padding: 0 32px 12px;
            overflow-x: auto;
            align-items: center;
        }
        .group-tab {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }
        .group-tab:hover { border-color: var(--border-hover); color: var(--text-primary); }
        .group-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        .group-tab-manage {
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: inherit;
        }
        .group-tab-manage:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* ─── Group Modal ─── */
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .modal-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .modal-tab:hover { color: var(--text-secondary); }
        .modal-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

        .group-card {
            background: var(--bg-glass);

        }

        .group-student-chip {

            display: flex;
            align-items: center;
            gap: 4px;

        .group-student-chip .chip-remove {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1;
        }
        .group-student-chip .chip-remove:hover { color: var(--accent-rose); }

        .new-group-form {
            border: 1px dashed var(--border);
            border-radius: 10px;
            padding: 14px;
        }
        .new-group-form input, .new-group-form select {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
        }
        .new-group-form input:focus { border-color: var(--accent-blue); }
        .new-group-form input::placeholder { color: var(--text-muted); }

        .student-checkbox-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .student-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.15s;
        }
        .student-checkbox-item:hover { background: rgba(255,255,255,0.03); }
        .student-checkbox-item input[type="checkbox"] {
            accent-color: var(--accent-blue);
        }

        .add-student-row {
            position: relative;
            margin-top: 16px;
        }

        .add-student-input-row {

        }

        .add-student-row input[type="text"] {

            border-radius: 8px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
        .add-student-row input[type="text"]:focus { border-color: var(--accent-blue); }
        .add-student-row input[type="text"]::placeholder { color: var(--text-muted); }

        .search-results {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; margin-top: 4px; max-height: 220px;
            overflow-y: auto; z-index: 10; display: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .search-results.show { display: block; }
        .search-result-item {
            padding: 10px 14px; cursor: pointer; font-size: 13px;
            color: var(--text-primary); transition: background 0.15s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .search-result-item:hover { background: rgba(59, 130, 246, 0.1); }
        .search-result-item .result-name { font-weight: 500; }
        .search-result-item .result-role { font-size: 11px; color: var(--text-muted); }
        .search-result-item.already-added { opacity: 0.4; pointer-events: none; }
        .search-result-item.already-added::after {
            content: 'Added'; font-size: 10px; color: var(--accent-emerald);
            font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .search-loading { padding: 12px 14px; font-size: 12px; color: var(--text-muted); text-align: center; }

        .btn-add {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: var(--accent-blue);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn-add:hover { background: #2563eb; }

        /* ─── Loading Overlay ─── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(4px);
            z-index: 150;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.show { display: flex; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .loading-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* ─── Animations ─── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        .student-card { animation: fadeIn 0.4s ease forwards; opacity: 0; }
        .student-card:nth-child(1) { animation-delay: 0s; }
        .student-card:nth-child(2) { animation-delay: 0.05s; }
        .student-card:nth-child(3) { animation-delay: 0.1s; }
        .student-card:nth-child(4) { animation-delay: 0.15s; }

        /* ─── Scrollbar ─── */

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        @media (max-width: 900px) {
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .student-grid { grid-template-columns: 1fr; }
            .trends-grid { grid-template-columns: 1fr; }

            .main { padding: 16px; }

        /* ─── Chat Panel ─── */
        .chat-fab {

        .chat-header-dot {
            width: 8px;

        }
        .chat-close {
            width: 30px;
            height: 30px;
            border-radius: 8px;

            background: var(--bg-glass);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;

        .chat-chip {
            padding: 6px 14px;
            border-radius: 20px;

            background: var(--bg-glass);
            color: var(--text-secondary);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-bubble {

            padding: 10px 14px;

            border-bottom-right-radius: 4px;

            align-self: flex-start;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .chat-input:focus { border-color: var(--accent-blue); }
